name: triage

on:
  issues:
    types: [opened, edited, reopened]
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

permissions: {}

jobs:
  issue-labeler:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run issue labeler
        uses: github/issue-labeler@v3.4
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/issue-labeler.yml
          enable-versioned-regex: 0
          include-title: 1
          include-body: 1
          sync-labels: 1

  pr-labeler:
    if: github.event_name == 'pull_request_target' && github.event.action != 'edited'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run PR labeler
        uses: actions/labeler@v6
        with:
          configuration-path: .github/pr-labeler.yml
          sync-labels: false

  request-info:
    if: github.event.action == 'opened' || github.event.action == 'edited'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run request info
        uses: tomdewildt/request-info@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

  first-interaction:
    if: github.event.action == 'opened' && github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run first interaction
        uses: actions/first-interaction@v3
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          issue_message: >
            Thanks for opening your first issue here! A maintainer will take a
            look as soon as possible. In the meantime, double-check that the
            issue follows the template, it makes triage much faster.
          pr_message: >
            Thanks for your first pull request! A maintainer will review it as
            soon as possible. Make sure CI is green and the PR description
            explains the change and links any related issue.
